<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>停车通知系统 - 发送通知</title>
    <link rel="stylesheet" href="../public/css/style.css">
</head>
<body>
    <div class="container">
        <h1>停车通知系统</h1>
        
        <!-- 通知表单 -->
        <h2>发送移车通知</h2>
        <form id="notify-form">
            <div class="form-group">
                <label for="message">留言（可选）</label>
                <textarea id="message" placeholder="请输入您的留言..."></textarea>
            </div>
            <div style="margin-top: 20px;">
                <button type="button" class="btn" id="send-btn">发送通知</button>
            </div>
        </form>
        
        <!-- 发送结果 -->
        <div class="qrcode-container" id="result-container" style="display: none;">
            <h2>发送结果</h2>
            <div id="result-content"></div>
        </div>
        
        <!-- 通知区域 -->
        <div id="notification" style="display: none;"></div>
    </div>
    
    <script>
        // 从 URL 获取加密数据
        function getEncryptedData() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('data');
        }
        
        // 发送通知按钮点击事件
        document.getElementById('send-btn').addEventListener('click', function() {
            const encryptedData = getEncryptedData();
            
            if (!encryptedData) {
                showNotification('二维码数据无效', 'error');
                return;
            }
            
            // 显示加载状态
            this.innerHTML = '<span class="loading"></span> 发送中...';
            this.disabled = true;
            
            // 获取留言
            const message = document.getElementById('message').value;
            
            // 发送请求到后端
            fetch('http://localhost:5000/api/notify', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    encrypted_data: encryptedData,
                    message: message
                })
            })
            .then(response => response.json())
            .then(data => {
                // 恢复按钮状态
                document.getElementById('send-btn').innerHTML = '发送通知';
                document.getElementById('send-btn').disabled = false;
                
                if (data.success) {
                    // 显示发送结果
                    showResult(data.results);
                    
                    // 显示成功通知
                    showNotification('通知发送成功！', 'success');
                } else {
                    // 显示错误通知
                    showNotification('发送失败：' + data.error, 'error');
                }
            })
            .catch(error => {
                // 恢复按钮状态
                document.getElementById('send-btn').innerHTML = '发送通知';
                document.getElementById('send-btn').disabled = false;
                
                // 显示错误通知
                showNotification('网络错误，请稍后重试', 'error');
            });
        });
        
        // 显示发送结果
        function showResult(results) {
            const resultContainer = document.getElementById('result-container');
            const resultContent = document.getElementById('result-content');
            
            let resultHTML = '<ul>';
            for (const [type, success] of Object.entries(results)) {
                const status = success ? '成功' : '失败';
                const statusClass = success ? 'success' : 'error';
                
                // 转换通知类型为中文
                let typeText = type;
                switch (type) {
                    case 'dingtalk':
                        typeText = '钉钉';
                        break;
                    case 'feishu':
                        typeText = '飞书';
                        break;
                    case 'wechat':
                        typeText = '企业微信';
                        break;
                    case 'email':
                        typeText = '邮件';
                        break;
                    case 'sms':
                        typeText = '短信';
                        break;
                }
                
                resultHTML += `<li class="${statusClass}">${typeText}: ${status}</li>`;
            }
            resultHTML += '</ul>';
            
            resultContent.innerHTML = resultHTML;
            resultContainer.style.display = 'block';
        }
        
        // 显示通知函数
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            notification.style.display = 'block';
            
            // 3秒后隐藏通知
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }
        
        // 页面加载时检查数据
        window.onload = function() {
            const encryptedData = getEncryptedData();
            if (!encryptedData) {
                showNotification('二维码数据无效', 'error');
            }
        };
    </script>
</body>
</html>
