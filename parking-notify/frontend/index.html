<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>停车通知系统 - 生成二维码</title>
    <link rel="stylesheet" href="public/css/style.css">
</head>
<body>
    <div class="container">
        <h1>停车通知系统</h1>
        
        <!-- 通知配置表单 -->
        <h2>通知配置</h2>
        <form id="notification-form">
            <!-- 钉钉配置 -->
            <div class="form-group">
                <label for="dingtalk">钉钉机器人 Webhook URL</label>
                <input type="url" id="dingtalk" placeholder="例如：https://oapi.dingtalk.com/robot/send?access_token=...">
            </div>
            
            <!-- 飞书配置 -->
            <div class="form-group">
                <label for="feishu">飞书机器人 Webhook URL</label>
                <input type="url" id="feishu" placeholder="例如：https://open.feishu.cn/open-apis/bot/v2/hook/...">
            </div>
            
            <!-- 企业微信配置 -->
            <div class="form-group">
                <label for="wechat">企业微信机器人 Webhook URL</label>
                <input type="url" id="wechat" placeholder="例如：https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=...">
            </div>
            
            <!-- 邮件配置 -->
            <div class="form-group">
                <label for="email">邮箱地址</label>
                <input type="email" id="email" placeholder="例如：example@qq.com">
            </div>
            
            <!-- 短信配置 -->
            <div class="form-group">
                <label for="sms">手机号码</label>
                <input type="tel" id="sms" placeholder="例如：138****8888">
            </div>
            
            <!-- 自定义通知内容 -->
            <div class="form-group">
                <label for="message">自定义通知内容</label>
                <textarea id="message" placeholder="默认：有人需要您移车，请尽快处理"></textarea>
            </div>
            
            <!-- 二维码颜色配置 -->
            <div class="form-group">
                <h2>二维码样式</h2>
                <div class="color-picker">
                    <label for="qrcode-color">二维码颜色</label>
                    <input type="color" id="qrcode-color" value="#000000">
                </div>
                <div class="color-picker">
                    <label for="qrcode-background">背景颜色</label>
                    <input type="color" id="qrcode-background" value="#FFFFFF">
                </div>
            </div>
            
            <!-- 提交按钮 -->
            <div style="margin-top: 20px;">
                <button type="button" class="btn" id="generate-btn">生成二维码</button>
            </div>
        </form>
        
        <!-- 二维码展示区域 -->
        <div class="qrcode-container" id="qrcode-container" style="display: none;">
            <h2>生成的二维码</h2>
            <p>请将此二维码打印并贴在车上，别人扫码后会通知您移车</p>
            <div class="qrcode-image">
                <img id="qrcode-image" src="" alt="停车通知二维码">
            </div>
            <button type="button" class="btn" id="download-btn">下载二维码</button>
        </div>
        
        <!-- 通知区域 -->
        <div id="notification" style="display: none;"></div>
    </div>
    
    <script>
        // 生成二维码按钮点击事件
        document.getElementById('generate-btn').addEventListener('click', function() {
            // 显示加载状态
            this.innerHTML = '<span class="loading"></span> 生成中...';
            this.disabled = true;
            
            // 收集表单数据
            const notificationConfig = {
                dingtalk: document.getElementById('dingtalk').value,
                feishu: document.getElementById('feishu').value,
                wechat: document.getElementById('wechat').value,
                email: document.getElementById('email').value,
                sms: document.getElementById('sms').value
            };
            
            const message = document.getElementById('message').value || '有人需要您移车，请尽快处理';
            
            const qrcodeConfig = {
                color: document.getElementById('qrcode-color').value,
                background: document.getElementById('qrcode-background').value
            };
            
            // 发送请求到后端
            fetch('http://localhost:5000/api/generate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    notification_config: notificationConfig,
                    message: message,
                    qrcode_config: qrcodeConfig
                })
            })
            .then(response => response.json())
            .then(data => {
                // 恢复按钮状态
                document.getElementById('generate-btn').innerHTML = '生成二维码';
                document.getElementById('generate-btn').disabled = false;
                
                if (data.success) {
                    // 显示二维码
                    document.getElementById('qrcode-image').src = data.qrcode;
                    document.getElementById('qrcode-container').style.display = 'block';
                    
                    // 显示成功通知
                    showNotification('二维码生成成功！', 'success');
                } else {
                    // 显示错误通知
                    showNotification('生成失败：' + data.error, 'error');
                }
            })
            .catch(error => {
                // 恢复按钮状态
                document.getElementById('generate-btn').innerHTML = '生成二维码';
                document.getElementById('generate-btn').disabled = false;
                
                // 显示错误通知
                showNotification('网络错误，请稍后重试', 'error');
            });
        });
        
        // 下载二维码按钮点击事件
        document.getElementById('download-btn').addEventListener('click', function() {
            const qrcodeImage = document.getElementById('qrcode-image');
            const link = document.createElement('a');
            link.href = qrcodeImage.src;
            link.download = 'parking-notify-qrcode.png';
            link.click();
        });
        
        // 显示通知函数
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            notification.style.display = 'block';
            
            // 3秒后隐藏通知
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
